$schema: http://json-schema.org/draft-07/schema#
$id: SPORE/v1d0

title: Spore OS Manifest

description: Schema for a Spore OS node manifest (SPORE/v1d0)

type: object

required:
  - id
  - name
  - app
  - schema
  - description

additionalProperties: false

properties:

  id:
    type: string
    description: Reverse-domain unique identifier for this node.
    examples:
      - com.example.clock
      - SPORE.filesystem

  name:
    type: string
    description: Human-readable name for this node.

  app:
    type: string
    description: "How to invoke this application. Examples: \"./clock\" (Unix/Linux), \"./clock.exe\" (Windows), \"clock.sh\", \"python -m myclock\", \"node app.js\". Use \"n/a\" for system nodes (like the hub) that don't have a separate executable. Relative paths are relative to the manifest directory."

  trust:
    type: string
    description: Trust level of the node.
    enum:
      - system
      - developer
      - trusted
      - standard
      - untrusted

  version:
    type: string
    description: Node API version in MAJOR.MINOR.PATCH format.
    pattern: ^[0-9]+\.[0-9]+\.[0-9]+$
    examples:
      - 1.0.0
      - 2.1.3

  schema:
    type: string
    description: Spore OS manifest schema version.
    enum:
      - SPORE/v0d1
      - SPORE/v0d2

  description:
    type: string
    description: Short description of the node's purpose.

  autostart:
    type: boolean
    description: If true, the hub spawns this node automatically when the hub starts. Default is false. Only meaningful if app is set to a real executable path.
    default: false

  witness:
    type: boolean
    description: If true, this node receives all witness traffic from the hub (fire-and-forget copies of every message). Default is false.
    default: false

  api:
    type: array
    description: All callable subjects this node exposes.
    items:
      $ref: "#/definitions/api_entry"
    default: []

  topics:
    type: array
    description: All subscribable topics this node exposes.
    items:
      $ref: "#/definitions/topic_entry"
    default: []

  errors:
    type: array
    description: Custom node-defined errors this node may emit using the custom_error flag.
    items:
      $ref: "#/definitions/error_entry"
    default: []

# ── Definitions ────────────────────────────────────────────────────────────────

definitions:

  error_entry:
    type: object
    required:
      - name
      - description
    additionalProperties: false
    properties:
      name:
        type: string
        description: "Error code for this error, by convention nodename.err.reason (e.g. clock.err.invalid_timezone)."
      description:
        type: string
        description: "What this error means."
      examples:
        type: array
        items:
          type: string
        description: "Potential causes or scenarios that trigger this error."

  input:
    type: object
    required:
      - name
      - type
      - description
    additionalProperties: false
    properties:
      name:
        type: string
        description: "Argument name. Must not use a protocol-reserved keyword (cast, capture, error, custom_error, code, what, ok, etc.) or any name beginning with spore_."
        allOf:
          - not:
              enum: [cast, capture, error, custom_error, code, what, ok, json, node_error, cast_error, capture_error]
          - not:
              pattern: "^spore_"
      type:
        type: string
        description: "Type hint for this argument: string, integer, float, boolean, array, object (require a value); flag (bare token)."
      required:
        type: boolean
        default: false
        description: "Whether this argument must be provided. Should be false for type: flag."
      description:
        type: string

  output:
    type: object
    required:
      - name
      - type
      - description
    additionalProperties: false
    properties:
      name:
        type: string
        description: "Name for this output variant (e.g. the field name on success, or the error label on failure)."
      type:
        type: string
        description: "Type hint (string, integer, boolean, array, object, etc.) or a specific response type (e.g., dialog.err.user_cancelled)."
      description:
        type: string

  risk:
    type: string
    description: Risk level of a capability.
    enum:
      - benign
      - standard
      - personal
      - secret
      - protected

  api_entry:
    type: object
    required:
      - name
      - description
      - usage
      - risk
    additionalProperties: false
    properties:
      name:
        type: string
        description: Subject name for this entry.
      description:
        type: string
        description: Description of the entry.
      usage:
        type: array
        items:
          type: string
        description: Example calls showing how to use this subject.
      risk: 
        $ref: "#/definitions/risk"
      inputs:
        type: array
        items:
          $ref: "#/definitions/input"
        default: []
        description: Input arguments. Omit if none.
      outputs:
        type: array
        items:
          $ref: "#/definitions/output"
        description: Possible output responses. Omit if returns nothing. Each entry is a possible outcome (data type or specific error response).
      notes:
        type: array
        items:
          type: string
        description: Optional clarifying notes about this API entry. Useful for documenting constraints, mutual exclusivity, or other guidance that complements the structured fields.

  topic_entry:
    type: object
    required:
      - name
      - description
      - usage
      - risk
    additionalProperties: false
    properties:
      name: 
        type: string
        description: Subject name for this topic.
      description:
        type: string
        description: Description of the topic.
      usage: 
        type: array
        items: 
          type: string
        description: Examples of published calls.
      risk:
        $ref: "#/definitions/risk"
      outputs:
        type: array
        items:
          $ref: "#/definitions/output"
        description: Possible data
